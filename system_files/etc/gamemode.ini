# FurryOS Gaming Mode Configuration
# GameMode daemon settings for optimal gaming performance

[gamemode]
# Renice games to this priority (negative = higher priority)
renice=15

# CPU governor for performance
governor=performance

# IGPU power save disable (for better gaming FPS)
igpu_power_enable=0

# Audio configuration
pulse_server=/run/user/%u/pulse/native

# Disable CPU frequency scaling while in game mode
cpu_freq_scaling=1

[filter]
# Apply GameMode to Steam and Proton games
whitelist=/usr/bin/steam
whitelist=/usr/bin/steamos-gamemode
whitelist=/usr/bin/protontricks
