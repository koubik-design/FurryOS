# FurryOS Gaming System Optimizations
# These settings optimize performance for gaming workloads

# Increase file descriptor limits for games and Steam
fs.file-max = 2097152

# Improve network performance for online gaming
net.ipv4.tcp_tw_reuse = 1
net.ipv4.tcp_fin_timeout = 30
net.ipv4.tcp_keepalive_time = 300

# Increase TCP socket buffer sizes for better throughput
net.core.rmem_max = 134217728
net.core.wmem_max = 134217728
net.ipv4.tcp_rmem = 4096 87380 134217728
net.ipv4.tcp_wmem = 4096 65536 134217728

# Increase backlog queue for high-performance gaming
net.core.netdev_max_backlog = 5000
net.ipv4.tcp_max_syn_backlog = 5000

# Improve VM performance
vm.swappiness = 10
vm.dirty_ratio = 10
vm.dirty_background_ratio = 5

# CPU performance tuning
kernel.sched_migration_cost_ns = 5000000
kernel.sched_autogroup_enabled = 0

# IO scheduler hints for SSD gaming drives
vm.page-cluster = 0
