# FurryOS Gaming - System resource limits
# These limits are increased for better gaming performance

# Increase max open files for gaming applications
*  soft  nofile  524288
*  hard  nofile  524288

# Increase max processes (for heavy multithreaded games and emulators)
*  soft  nproc   65535
*  hard  nproc   65535

# Increase max locked memory for audio applications
*  soft  memlock unlimited
*  hard  memlock unlimited

# Increase stack size for some demanding applications
*  soft  stack   unlimited
*  hard  stack   unlimited

# Increase realtime priority for audio and gaming processes
*  soft  rtprio  99
*  hard  rtprio  99
